<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wachten op betaling…</title>
  <meta http-equiv="refresh" content="5;url=/return?file_id={{ file_id }}">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Segoe UI", Arial, sans-serif; background: #f3f4f6; min-height: 100vh;
           display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,.10);
            padding: 48px 44px; width: 100%; max-width: 460px; text-align: center; }
    .spinner { width: 44px; height: 44px; border: 4px solid #e5e7eb; border-top-color: #0078d4;
               border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 24px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1  { font-size: 1.15rem; font-weight: 700; color: #111; margin-bottom: 8px; }
    p   { font-size: .875rem; color: #666; }
    .btn { display: inline-block; margin-top: 24px; padding: 10px 24px; background: #0078d4;
           color: #fff; border-radius: 8px; text-decoration: none; font-size: .9rem; font-weight: 600; }
  </style>
</head>
<body>
<div class="card">
  <div class="spinner"></div>
  <h1>Wachten op betalingsbevestiging…</h1>
  <p>Deze pagina ververst automatisch. Even geduld.</p>
  <a href="/return?file_id={{ file_id }}" class="btn">Handmatig vernieuwen</a>
</div>
</body>
</html>
