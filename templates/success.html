<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klaar — {{ config.TOOL_NAAM }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Segoe UI", Arial, sans-serif; background: #f3f4f6; min-height: 100vh;
           display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,.10);
            padding: 48px 44px; width: 100%; max-width: 500px; text-align: center; }
    .icon { font-size: 3rem; margin-bottom: 16px; }
    h1   { font-size: 1.3rem; font-weight: 700; color: #111; margin-bottom: 8px; }
    p    { font-size: .9rem; color: #555; margin-bottom: 6px; }
    .files { background: #f7f8fa; border-radius: 6px; padding: 10px 14px; margin: 16px 0;
             text-align: left; }
    .files li { font-size: .85rem; color: #444; padding: 2px 0; list-style: none; }
    .files li::before { content: "📄 "; }
    .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 24px; }
    .btn { display: block; padding: 12px; border-radius: 8px; font-size: .95rem;
           font-weight: 600; text-decoration: none; text-align: center; cursor: pointer;
           border: none; width: 100%; }
    .btn-primary { background: #0078d4; color: #fff; }
    .btn-primary:hover { background: #005fa3; }
    .btn-secondary { background: #f3f4f6; color: #333; border: 1px solid #d1d5db; }
    .btn-secondary:hover { background: #e5e7eb; }
    .back { display: block; margin-top: 16px; font-size: .85rem; color: #0078d4;
            text-decoration: none; }
    .back:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="card">
  <div class="icon">✅</div>
  <h1>Projectberekening aangemaakt!</h1>
  <p>Je bestand is klaar:</p>
  <p><strong>{{ uitvoernaam }}.uniec3</strong></p>

  <div class="files">
    <p style="font-size:.8rem;color:#888;margin-bottom:6px;">Samengesteld uit:</p>
    <ul>{% for fn in filenames %}<li>{{ fn }}</li>{% endfor %}</ul>
  </div>

  <div class="btn-group">
    <a href="/download/{{ file_id }}" class="btn btn-primary">⬇ Download projectberekening</a>
    <a href="/download-invoice/{{ file_id }}" class="btn btn-secondary">🧾 Download factuur (PDF)</a>
  </div>

  <a href="/" class="back">← Nieuwe samenvoeging</a>
</div>
</body>
</html>
